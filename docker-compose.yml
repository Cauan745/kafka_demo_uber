
services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Allow the internal group coordinator to exist on 1 node
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  #kafka-ui:
    #image: provectuslabs/kafka-ui:latest
    #container_name: kafka-ui
    #ports:
    #  - "8008:8080"
    #environment:
      # Tells the UI to connect using the INTERNAL listener
    #  KAFKA_CLUSTERS_0_NAME: local-go-dev 
    #  KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    #depends_on:
    #  - kafka

  database:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kafka_uber
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kafka_uber"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
  server:
    image: golang:latest
    container_name: server
    working_dir: /app
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    environment:
      - DB_HOST=postgres_db
    ports:
      - "8000:8000"
      - "8080:8080"
    command: sh -c "go run cmd/consumer/server/*.go -host=kafka:29092"
    depends_on:
      kafka:
        condition: service_healthy
      database:
        condition: service_healthy

  producer:
    image: golang:latest
    container_name: producer
    working_dir: /app
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    command: sh -c "go run cmd/producer/driver_tracker.go -host=kafka:29092 -quantity=0"
    depends_on:
      kafka:
        condition: service_healthy

  nginx:
    image: nginx:stable-alpine
    container_name: nginx_server
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
    depends_on: 
      - server

volumes:
  go-mod-cache:
  go-build-cache:
  postgres_data:
