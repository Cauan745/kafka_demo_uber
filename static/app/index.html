<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber Real-Time Tracker</title>
    
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <button onclick="startRide()" style="position: absolute; top: 10px; left: 10px; z-index: 1000;">Start Ride</button>
    <div id="map"></div>

    <script>
        // Initialize the map
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json',
            center: [-63.8972, -8.7636], // Your Longitude, Latitude
            zoom: 15 // Fixed zoom level!
        });

        const driversMap = {}

    let ws;

    function connect() {
        ws = new WebSocket("ws://localhost:8000/ws");

        const driverIdToMarker = {}

        ws.onopen = function() {
            console.log("Connected to WebSocket server");
        };

        ws.onmessage = function(event) {

            const pos = JSON.parse(event.data)
            
            if(pos.passengerId)
              handlerPassengerJson(pos)
            else
              handleDriverJson(pos, driverIdToMarker)
        };

        ws.onclose = function() {
            console.log("WebSocket connection closed, retrying...");
            setTimeout(connect, 3000); // Reconnect after 3 second
        };

        ws.onerror = function(error) {
            console.error("WebSocket error:", error);
        };
    }
        function handlerPassengerJson(pos){

              // --- Create the Passenger Marker (Person Icon) ---
              const passengerEl = document.createElement('div');
              passengerEl.className = 'passenger-marker';
              passengerEl.innerHTML = `
                <svg viewBox="0 0 24 24" fill="${pos.hexColor}" width="32" height="32">
                  <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
              `;

          const marker = new maplibregl.Marker({element: passengerEl})
              .setLngLat([pos.longitude, pos.latitude])
              .addTo(map);
              
              console.log("--------------------------Passenger Position")
              console.log(pos)

        }

        function handleDriverJson(pos, driverIdToMarker){
            
            

            if(pos.driverId in driverIdToMarker){
              driverIdToMarker[pos.driverId].setLngLat([pos.position.longitude, pos.position.latitude])

            } else {

              console.log(pos.position.latitude)

              // --- Create the Driver Marker (Car Icon) ---
              const driverEl = document.createElement('div');
              driverEl.className = 'driver-marker';
              driverEl.innerHTML = `
                <svg viewBox="0 0 24 24" fill="${pos.hexColor}" width="32" height="32">
                  <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
                </svg>
              `;

              const marker = new maplibregl.Marker({element: driverEl})
              .setLngLat([pos.position.longitude, pos.position.latitude])
              .addTo(map);

              driverIdToMarker[pos.driverId] = marker

              console.log(driverIdToMarker)

            }

        }

        function startRide() {
            const lat = -8.77 + Math.random() * 0.02;
            const lng = -63.91 + Math.random() * 0.03;

            map.flyTo({
                center: [lng, lat],
                zoom: 15
            });

            fetch("/api/ride/start", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    latitude: lat,
                    longitude: lng
                })
            }).then(res => {
                console.log("Ride started");
            }).catch(err => console.error(err));
        }

    connect();

    </script>
</body>
</html>
